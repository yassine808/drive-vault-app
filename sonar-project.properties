sonar.organization=yassine808
sonar.projectKey=yassine808_vault-app
sonar.exclusions=node_modules/**,dist/**,build/**,*.config.js
sonar.ci.autoconfig.disabled=true

# SHA-1 is required by the HIBP k-anonymity breach-check API (the protocol
# only accepts a 5-char prefix lookup; the full hash never leaves the client).
# Suppress the weak-hash finding on the breach-check code path.
sonar.issue.ignore.block=hibp_sha1
sonar.issue.ignore.block.hibp_sha1.ruleKey=typescript:S4790
sonar.issue.ignore.block.hibp_sha1.startLineRegexp=async function checkBreach
sonar.issue.ignore.block.hibp_sha1.endLineRegexp=return \{ breached: count > 0, count \}